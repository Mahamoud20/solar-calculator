<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Setup Calculator</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f5f7fb;
            color: #333;
            margin: 0;
            padding: 15px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 20px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
            color: #4a5568;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #f8fafc;
        }
        .btn {
            background-color: #27ae60;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
        .results-box {
            display: none;
            margin-top: 20px;
            background-color: #ebf7ee;
            border-left: 5px solid #27ae60;
            border-radius: 6px;
            padding: 15px;
        }
        .results-title {
            font-size: 16px;
            font-weight: bold;
            color: #219653;
            margin-top: 0;
            margin-bottom: 12px;
        }
        .result-item {
            background: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .result-item strong {
            color: #2c3e50;
        }
        .note {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 10px;
            line-height: 1.3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Solar Setup Calculator</h2>
    
    <div class="form-group">
        <label>Daily Energy Load (Wh):</label>
        <input type="number" id="dailyLoad" value="5000">
    </div>

    <div class="form-group">
        <label>Battery Type:</label>
        <select id="batType">
            <option value="0.80" selected>Lithium (LiFePO4) - 80% DoD</option>
            <option value="0.50">Gel / Tubular / AGM - 50% DoD</option>
        </select>
    </div>

    <div class="form-group">
        <label>System Battery Voltage (V):</label>
        <select id="sysVoltage">
            <option value="48" selected>48V System</option>
            <option value="24">24V System</option>
            <option value="12">12V System</option>
        </select>
    </div>

    <div class="form-group">
        <label>Single Panel Wattage (W):</label>
        <input type="number" id="panelWatt" value="400">
    </div>

    <div class="form-group">
        <label>Single Panel Open Circuit Voltage (Voc):</label>
        <input type="number" id="panelVoc" value="49">
    </div>

    <button class="btn" id="calcBtn">Calculate Setup</button>

    <div class="results-box" id="results">
        <div class="results-title">📋 Recommended Setup</div>
        
        <div class="result-item">
            Daily Energy Load: <strong id="resLoad">0 Wh</strong>
        </div>
        
        <div class="result-item">
            Batteries Needed: <strong id="resBatteries">0 unit(s)</strong><br>
            <span style="font-size:12px; color:#7f8c8d;" id="resBatDetails"></span>
        </div>
        
        <div class="result-item">
            Solar Panels Needed: <strong id="resPanels">0 panel(s)</strong><br>
            <span style="font-size:12px; color:#7f8c8d;" id="resPanelDetails"></span>
        </div>

        <div class="result-item" style="border: 1px dashed #27ae60; background-color: #f4fbf6;">
            Required Controller: <strong id="resController">60A MPPT</strong><br>
            <span style="font-size:12px; color:#2c3e50;" id="resControllerDetails"></span>
        </div>

        <div class="note">
            *Calculations assume 5 peak sun hours per day and 20% system loss. Battery blocks assume standard 12V 150Ah configurations.
        </div>
    </div>
</div>

<script>
document.getElementById('calcBtn').onclick = function() {
    try {
        // 1. Grab inputs safely
        const dailyLoad = parseFloat(document.getElementById('dailyLoad').value) || 5000;
        const panelWatt = parseFloat(document.getElementById('panelWatt').value) || 400;
        const panelVoc = parseFloat(document.getElementById('panelVoc').value) || 49;
        const sysVoltage = parseFloat(document.getElementById('sysVoltage').value) || 48;
        const batteryDoD = parseFloat(document.getElementById('batType').value) || 0.80;

        // Constants
        const peakSunHours = 5.0;
        const efficiencyFactor = 0.80;
        const baseBatteryWh = 12 * 150; // 1800Wh per block

        // 2. Battery Storage Calculations
        const totalEnergyNeeded = dailyLoad / efficiencyFactor;
        const totalRawBatteryWh = totalEnergyNeeded / batteryDoD;
        const rawNumBatteries = totalRawBatteryWh / baseBatteryWh;
        
        // Match string setups
        let stringMultiplier = 1;
        if (sysVoltage === 24) stringMultiplier = 2;
        if (sysVoltage === 48) stringMultiplier = 4;
        
        let numBatteries = Math.ceil(rawNumBatteries / stringMultiplier) * stringMultiplier;
        const totalInstalledWh = numBatteries * baseBatteryWh;
        const targetAhAtSysV = totalInstalledWh / sysVoltage;

        // 3. Solar Calculations
        const minArrayPower = totalEnergyNeeded / peakSunHours;
        const numPanels = Math.ceil(minArrayPower / panelWatt);
        const actualArrayPower = numPanels * panelWatt;

        // 4. Charge Controller Calculations
        const rawControllerAmps = actualArrayPower / sysVoltage;
        const safeControllerAmps = rawControllerAmps * 1.25;

        let marketControllerAmps = 20;
        if (safeControllerAmps <= 20) marketControllerAmps = 20;
        else if (safeControllerAmps <= 30) marketControllerAmps = 30;
        else if (safeControllerAmps <= 40) marketControllerAmps = 40;
        else if (safeControllerAmps <= 60) marketControllerAmps = 60;
        else if (safeControllerAmps <= 80) marketControllerAmps = 80;
        else marketControllerAmps = Math.ceil(safeControllerAmps / 10) * 10;

        const totalArrayVoc = numPanels * panelVoc;

        // 5. Render to screen safely
        document.getElementById('resLoad').innerText = dailyLoad.toLocaleString() + " Wh (" + (dailyLoad/1000).toFixed(2) + " kWh)";
        
        let stringConfigText = "";
        if (sysVoltage === 48) stringConfigText = " (" + (numBatteries / 4) + " string(s) of 4 in series)";
        else if (sysVoltage === 24) stringConfigText = " (" + (numBatteries / 2) + " string(s) of 2 in series)";
        else stringConfigText = " (All in parallel)";

        document.getElementById('resBatteries').innerText = numBatteries + " unit(s)" + stringConfigText;
        document.getElementById('resBatDetails').innerText = "Total capacity bank size: " + targetAhAtSysV.toFixed(1) + " Ah at " + sysVoltage + "V.";
        
        document.getElementById('resPanels').innerText = numPanels + " panel(s)";
        document.getElementById('resPanelDetails').innerText = "Actual array size: " + actualArrayPower.toLocaleString() + " Watts";
        
        document.getElementById('resController').innerText = marketControllerAmps + "A MPPT";
        document.getElementById('resControllerDetails').innerText = "Safe Current limit: " + safeControllerAmps.toFixed(1) + "A. Maximum input string entry voltage: " + totalArrayVoc.toFixed(0) + "V DC.";

        document.getElementById('results').style.display = 'block';
    } catch(err) {
        alert("Calculation error. Please verify input numbers.");
    }
};
</script>

</body>
</html>
